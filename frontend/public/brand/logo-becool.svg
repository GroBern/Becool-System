<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Be Cool Surf Camp">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <!-- Outer black circle -->
  <circle cx="256" cy="256" r="244" fill="url(#bg)" stroke="#000" stroke-width="4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#fff" stroke-width="4" opacity="0.12"/>

  <!-- Wave curl on the right -->
  <path d="M360 120 C 430 160 470 240 450 320 C 430 380 370 410 310 400 C 360 380 400 330 410 280 C 415 230 400 180 360 150 Z"
        fill="#fff" opacity="0.85"/>
  <path d="M380 190 C 420 220 430 270 410 310 C 395 335 370 345 345 340 C 375 330 395 305 400 275 C 402 250 395 225 375 210 Z"
        fill="#000"/>

  <!-- Palm tree silhouette on the left -->
  <g transform="translate(120 160)">
    <!-- trunk -->
    <path d="M60 10 C 55 60 50 120 45 200 L 60 200 C 65 120 68 60 72 10 Z" fill="#fff"/>
    <!-- leaves -->
    <path d="M66 8 C 10 -10 -20 40 -10 80 C 20 60 50 45 70 30 Z" fill="#fff"/>
    <path d="M66 8 C 130 -10 170 40 150 80 C 120 55 95 42 70 30 Z" fill="#fff"/>
    <path d="M66 8 C 40 -50 100 -70 130 -50 C 110 -40 90 -25 70 -10 Z" fill="#fff"/>
    <path d="M66 8 C 90 -50 30 -70 0 -50 C 25 -40 50 -20 70 -5 Z" fill="#fff"/>
    <!-- small dot -->
    <circle cx="66" cy="8" r="6" fill="#fff"/>
  </g>

  <!-- Surfer silhouette -->
  <g transform="translate(256 290)" fill="#fff">
    <!-- board -->
    <path d="M -100 50 C -40 70 60 70 120 50 L 110 62 C 55 80 -40 80 -95 62 Z"/>
    <!-- body crouched -->
    <path d="M 10 -40 C 30 -50 50 -40 55 -20 L 60 20 C 55 35 35 45 15 45 L -10 45 C -20 30 -15 10 -5 -5 C 0 -20 5 -30 10 -40 Z"/>
    <!-- head -->
    <circle cx="30" cy="-55" r="14"/>
    <!-- arm -->
    <path d="M -15 -5 C -35 -10 -55 5 -50 20 C -35 15 -20 10 -10 5 Z"/>
  </g>

  <!-- Bottom text -->
  <g fill="#fff" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="256" y="430" font-size="44" letter-spacing="1">Be Cool</text>
    <text x="256" y="462" font-size="22" letter-spacing="4">SURF CAMP</text>
    <text x="256" y="482" font-size="11" letter-spacing="6" opacity="0.75">— SINCE 2011 —</text>
  </g>
</svg>
