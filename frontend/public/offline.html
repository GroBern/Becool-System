<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Becool Surf School</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0ea5e9, #0369a1);
      color: #fff; text-align: center; padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.15);
      padding: 40px; border-radius: 24px; max-width: 420px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p  { margin: 0 0 20px; opacity: .9; line-height: 1.5; }
    button {
      background: #fff; color: #0369a1; border: 0;
      padding: 12px 24px; border-radius: 999px; font-weight: 600;
      cursor: pointer; font-size: 15px;
    }
    .wave { font-size: 64px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="wave">🌊</div>
    <h1>You're offline</h1>
    <p>Becool Surf School can't reach the network right now. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
